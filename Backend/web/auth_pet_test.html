<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPal - Authentication & Pet Management Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(86, 171, 47, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(235, 51, 73, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .token-display {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
        }

        .pets-list {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 2px solid #e0e0e0;
            max-height: 400px;
            overflow-y: auto;
        }

        .pet-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .pet-item h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .pet-item p {
            color: #666;
            margin: 5px 0;
            font-size: 14px;
        }

        .pet-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
            width: auto;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐾 PawPal Testing Suite</h1>
            <p>Authentication & Pet Management Integration Test</p>
        </div>

        <div class="content">
            <!-- Authentication Section -->
            <div class="section">
                <h2>👤 User Authentication</h2>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="test@pawpal.com" value="test@pawpal.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" value="TestPassword123!">
                </div>

                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" placeholder="John Doe" value="Test User">
                </div>

                <button class="btn btn-primary" onclick="registerUser()">Register User</button>
                <button class="btn btn-success" onclick="loginUser()">Login User</button>
                <button class="btn btn-danger" onclick="logoutUser()">Logout</button>

                <div id="authStatus"></div>

                <div id="tokenDisplay"></div>
            </div>

            <!-- Pet Management Section -->
            <div class="section">
                <h2>🐕 Pet Management</h2>
                
                <div class="form-group">
                    <label for="petName">Pet Name</label>
                    <input type="text" id="petName" placeholder="Buddy" value="Buddy">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="petType">Type</label>
                        <select id="petType">
                            <option value="dog">Dog</option>
                            <option value="cat">Cat</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="petBreed">Breed</label>
                        <input type="text" id="petBreed" placeholder="Golden Retriever" value="Golden Retriever">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="petAge">Age</label>
                        <input type="number" id="petAge" placeholder="3" value="3">
                    </div>

                    <div class="form-group">
                        <label for="petAgeUnit">Age Unit</label>
                        <select id="petAgeUnit">
                            <option value="years">Years</option>
                            <option value="months">Months</option>
                            <option value="weeks">Weeks</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="petGender">Gender</label>
                        <select id="petGender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="petColor">Color</label>
                        <input type="text" id="petColor" placeholder="Golden" value="Golden">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="petWeight">Weight</label>
                        <input type="number" step="0.1" id="petWeight" placeholder="30.5" value="30.5">
                    </div>

                    <div class="form-group">
                        <label for="petWeightUnit">Weight Unit</label>
                        <select id="petWeightUnit">
                            <option value="kg">Kilograms (kg)</option>
                            <option value="lbs">Pounds (lbs)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="petBio">Bio</label>
                    <textarea id="petBio" placeholder="Describe your pet...">Friendly and energetic golden retriever</textarea>
                </div>

                <button class="btn btn-success" onclick="createPet()">Create Pet</button>
                <button class="btn btn-primary" onclick="getAllPets()">Get All Pets</button>

                <div id="petStatus"></div>
            </div>

            <!-- Pets List Section -->
            <div class="section full-width">
                <h2>📋 My Pets</h2>
                <div id="petsList" class="pets-list">
                    <p style="text-align: center; color: #999;">No pets loaded. Login and click "Get All Pets" to view your pets.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8081/api/v1';
        let accessToken = '';
        let refreshToken = '';

        // Authentication Functions
        async function registerUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value;

            if (!email || !password || !displayName) {
                showStatus('authStatus', 'Please fill in all fields', 'error');
                return;
            }

            showStatus('authStatus', 'Registering user...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        displayName: displayName
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    accessToken = data.accessToken;
                    refreshToken = data.refreshToken;
                    showStatus('authStatus', `✅ User registered successfully! Email: ${email}`, 'success');
                    displayTokens();
                } else {
                    showStatus('authStatus', `❌ Registration failed: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showStatus('authStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function loginUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showStatus('authStatus', 'Please enter email and password', 'error');
                return;
            }

            showStatus('authStatus', 'Logging in...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    accessToken = data.accessToken;
                    refreshToken = data.refreshToken;
                    showStatus('authStatus', `✅ Login successful! Email: ${email}`, 'success');
                    displayTokens();
                    // Automatically load pets after login
                    getAllPets();
                } else {
                    showStatus('authStatus', `❌ Login failed: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showStatus('authStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function logoutUser() {
            if (!refreshToken) {
                showStatus('authStatus', 'No active session to logout', 'error');
                return;
            }

            showStatus('authStatus', 'Logging out...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        refreshToken: refreshToken
                    })
                });

                if (response.ok) {
                    accessToken = '';
                    refreshToken = '';
                    showStatus('authStatus', '✅ Logged out successfully!', 'success');
                    document.getElementById('tokenDisplay').innerHTML = '';
                    document.getElementById('petsList').innerHTML = '<p style="text-align: center; color: #999;">No pets loaded. Login and click "Get All Pets" to view your pets.</p>';
                } else {
                    showStatus('authStatus', '❌ Logout failed', 'error');
                }
            } catch (error) {
                showStatus('authStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        // Pet Management Functions
        async function createPet() {
            if (!accessToken) {
                showStatus('petStatus', '❌ Please login first!', 'error');
                return;
            }

            const petData = {
                name: document.getElementById('petName').value,
                type: document.getElementById('petType').value,
                breed: document.getElementById('petBreed').value,
                age: parseInt(document.getElementById('petAge').value),
                ageUnit: document.getElementById('petAgeUnit').value,
                gender: document.getElementById('petGender').value,
                color: document.getElementById('petColor').value,
                weight: parseFloat(document.getElementById('petWeight').value),
                weightUnit: document.getElementById('petWeightUnit').value,
                bio: document.getElementById('petBio').value
            };

            if (!petData.name || !petData.breed) {
                showStatus('petStatus', 'Please fill in at least name and breed', 'error');
                return;
            }

            showStatus('petStatus', 'Creating pet...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/pets`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify(petData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('petStatus', `✅ Pet "${data.pet.name}" created successfully!`, 'success');
                    // Refresh pets list
                    getAllPets();
                } else {
                    showStatus('petStatus', `❌ Failed to create pet: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showStatus('petStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function getAllPets() {
            if (!accessToken) {
                showStatus('petStatus', '❌ Please login first!', 'error');
                return;
            }

            showStatus('petStatus', 'Loading pets...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/pets`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    displayPets(data.pets);
                    showStatus('petStatus', `✅ Loaded ${data.count} pet(s)`, 'success');
                } else {
                    showStatus('petStatus', `❌ Failed to load pets: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showStatus('petStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function deletePet(petId, petName) {
            if (!accessToken) {
                showStatus('petStatus', '❌ Please login first!', 'error');
                return;
            }

            if (!confirm(`Are you sure you want to delete "${petName}"?`)) {
                return;
            }

            showStatus('petStatus', `Deleting "${petName}"...`, 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/pets/${petId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('petStatus', `✅ Pet "${petName}" deleted successfully!`, 'success');
                    // Refresh pets list
                    getAllPets();
                } else {
                    showStatus('petStatus', `❌ Failed to delete pet: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showStatus('petStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function updatePet(petId) {
            if (!accessToken) {
                showStatus('petStatus', '❌ Please login first!', 'error');
                return;
            }

            const newName = prompt('Enter new name:');
            const newAge = prompt('Enter new age:');
            
            if (!newName && !newAge) {
                return;
            }

            const updateData = {};
            if (newName) updateData.name = newName;
            if (newAge) updateData.age = parseInt(newAge);

            showStatus('petStatus', 'Updating pet...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/pets/${petId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify(updateData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('petStatus', `✅ Pet updated successfully!`, 'success');
                    // Refresh pets list
                    getAllPets();
                } else {
                    showStatus('petStatus', `❌ Failed to update pet: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showStatus('petStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        // UI Helper Functions
        function showStatus(elementId, message, type) {
            const statusDiv = document.getElementById(elementId);
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
        }

        function displayTokens() {
            const tokenDisplay = document.getElementById('tokenDisplay');
            tokenDisplay.innerHTML = `
                <strong>Access Token:</strong>
                <div class="token-display">${accessToken}</div>
                <strong>Refresh Token:</strong>
                <div class="token-display">${refreshToken}</div>
            `;
        }

        function displayPets(pets) {
            const petsList = document.getElementById('petsList');
            
            if (!pets || pets.length === 0) {
                petsList.innerHTML = '<p style="text-align: center; color: #999;">No pets found. Create your first pet!</p>';
                return;
            }

            petsList.innerHTML = pets.map(pet => `
                <div class="pet-item">
                    <h3>🐾 ${pet.name}</h3>
                    <p><strong>Type:</strong> ${pet.type.charAt(0).toUpperCase() + pet.type.slice(1)}</p>
                    <p><strong>Breed:</strong> ${pet.breed}</p>
                    <p><strong>Age:</strong> ${pet.age} ${pet.ageUnit}</p>
                    <p><strong>Gender:</strong> ${pet.gender.charAt(0).toUpperCase() + pet.gender.slice(1)}</p>
                    <p><strong>Color:</strong> ${pet.color}</p>
                    <p><strong>Weight:</strong> ${pet.weight} ${pet.weightUnit}</p>
                    ${pet.bio ? `<p><strong>Bio:</strong> ${pet.bio}</p>` : ''}
                    <p><strong>Verified:</strong> ${pet.isVerified ? '✅ Yes' : '❌ No'}</p>
                    <p style="font-size: 12px; color: #999;"><strong>ID:</strong> ${pet.id}</p>
                    <p style="font-size: 12px; color: #999;"><strong>Created:</strong> ${new Date(pet.createdAt).toLocaleString()}</p>
                    <div class="pet-actions">
                        <button class="btn btn-primary btn-small" onclick="updatePet('${pet.id}')">Update</button>
                        <button class="btn btn-danger btn-small" onclick="deletePet('${pet.id}', '${pet.name}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
