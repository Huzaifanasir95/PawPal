<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPal AI Chatbot - Streaming Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .streaming-badge {
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 8px;
            font-weight: 600;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .pet-profile {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .pet-profile input {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .emergency {
            background: #fff3cd !important;
            border-left: 4px solid #ff6b6b !important;
            color: #721c24 !important;
        }

        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #667eea;
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
        }

        .status.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐾 PawPal AI Veterinary Assistant</h1>
            <p>Ask me anything about pet health, nutrition, or care</p>
            <span class="streaming-badge">⚡ STREAMING ENABLED - Like ChatGPT</span>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">
                    Hello! I'm PawPal, your AI veterinary assistant. I can help you with pet health questions, diet advice, and general care tips. What would you like to know?
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="pet-profile">
                <input type="text" id="petName" placeholder="Pet name (optional)">
                <input type="text" id="petSpecies" placeholder="Species (Dog/Cat)">
                <input type="text" id="petBreed" placeholder="Breed">
                <input type="text" id="petAge" placeholder="Age">
            </div>
            <div class="input-row">
                <input type="text" id="userInput" placeholder="Ask your question..." onkeypress="handleKeyPress(event)">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="status" id="status"></div>

    <script>
        let currentEventSource = null;
        let currentMessageDiv = null;

        function showStatus(message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.classList.add('show');
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(content, isUser = false) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Check for emergency
            if (!isUser && content.includes('⚠️ EMERGENCY')) {
                contentDiv.classList.add('emergency');
            }
            
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            
            scrollToBottom();
            return messageDiv;
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            
            typingDiv.appendChild(indicator);
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message) return;

            // Get pet profile
            const petProfile = {};
            const name = document.getElementById('petName').value.trim();
            const species = document.getElementById('petSpecies').value.trim();
            const breed = document.getElementById('petBreed').value.trim();
            const age = document.getElementById('petAge').value.trim();

            if (name) petProfile.name = name;
            if (species) petProfile.species = species;
            if (breed) petProfile.breed = breed;
            if (age) petProfile.age = age;

            // Add user message
            addMessage(message, true);
            input.value = '';

            // Disable input
            sendBtn.disabled = true;
            input.disabled = true;

            // Show typing indicator briefly
            showTypingIndicator();

            // Create assistant message div for streaming
            setTimeout(() => {
                removeTypingIndicator();
                const chatContainer = document.getElementById('chatContainer');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = '<span class="streaming-cursor"></span>';
                
                messageDiv.appendChild(contentDiv);
                chatContainer.appendChild(messageDiv);
                currentMessageDiv = contentDiv;
                scrollToBottom();

                // Start streaming
                streamResponse(message, petProfile);
            }, 500);
        }

        function streamResponse(message, petProfile) {
            const sendBtn = document.getElementById('sendBtn');
            const input = document.getElementById('userInput');
            
            let accumulatedText = '';
            let startTime = Date.now();

            fetch('http://localhost:8081/api/v1/chatbot/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,
                    pet_profile: Object.keys(petProfile).length > 0 ? petProfile : null
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Stream request failed');
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                function processStream() {
                    reader.read().then(({done, value}) => {
                        if (done) {
                            // Remove cursor
                            const cursor = currentMessageDiv.querySelector('.streaming-cursor');
                            if (cursor) cursor.remove();
                            
                            // Re-enable input
                            sendBtn.disabled = false;
                            input.disabled = false;
                            input.focus();
                            
                            const duration = ((Date.now() - startTime) / 1000).toFixed(1);
                            showStatus(`✅ Response completed in ${duration}s`);
                            return;
                        }

                        // Decode chunk
                        const chunk = decoder.decode(value, {stream: true});
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.substring(6));
                                    
                                    if (data.error) {
                                        console.error('Stream error:', data.error);
                                        currentMessageDiv.innerHTML = `❌ Error: ${data.chunk || data.error}`;
                                        sendBtn.disabled = false;
                                        input.disabled = false;
                                        return;
                                    }

                                    if (data.chunk) {
                                        accumulatedText += data.chunk;
                                        
                                        // Update message content with streaming cursor
                                        let displayText = accumulatedText.replace(/\n/g, '<br>');
                                        
                                        // Check for emergency
                                        if (accumulatedText.includes('⚠️ EMERGENCY')) {
                                            currentMessageDiv.classList.add('emergency');
                                        }
                                        
                                        currentMessageDiv.innerHTML = displayText + '<span class="streaming-cursor"></span>';
                                        scrollToBottom();
                                    }

                                    if (data.done && !data.chunk) {
                                        // Remove cursor
                                        const cursor = currentMessageDiv.querySelector('.streaming-cursor');
                                        if (cursor) cursor.remove();
                                        
                                        sendBtn.disabled = false;
                                        input.disabled = false;
                                        input.focus();
                                        
                                        const duration = ((Date.now() - startTime) / 1000).toFixed(1);
                                        showStatus(`✅ Response completed in ${duration}s`);
                                        return;
                                    }
                                } catch (e) {
                                    console.error('Parse error:', e);
                                }
                            }
                        }

                        // Continue reading
                        processStream();
                    }).catch(error => {
                        console.error('Stream reading error:', error);
                        currentMessageDiv.innerHTML = `❌ Error: ${error.message}`;
                        sendBtn.disabled = false;
                        input.disabled = false;
                    });
                }

                processStream();
            })
            .catch(error => {
                console.error('Fetch error:', error);
                if (currentMessageDiv) {
                    currentMessageDiv.innerHTML = `❌ Error: ${error.message}`;
                }
                sendBtn.disabled = false;
                input.disabled = false;
                showStatus('❌ Request failed');
            });
        }

        // Auto-focus input on load
        window.onload = () => {
            document.getElementById('userInput').focus();
            showStatus('🟢 Ready - Real-time streaming enabled');
        };
    </script>
</body>
</html>
